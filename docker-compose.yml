services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - expense-tracker

  nginx:
    image: nginx:alpine
    container_name: expense-tracker-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - expense-tracker

  mysql:
    image: mysql:8.0
    container_name: expense-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: expense_tracker
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-tracker

  phpmyadmin:
    image: phpmyadmin:5.2.3
    container_name: expense-tracker-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: sail
      PMA_PASSWORD: password
    depends_on:
      - mysql
    networks:
      - expense-tracker

volumes:
  mysql-data:

networks:
  expense-tracker:
    driver: bridge
